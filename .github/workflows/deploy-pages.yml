name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Add deployment marker
        run: printf '%s\n' "$GITHUB_SHA" > deployment-version.txt
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

  verify:
    if: ${{ always() }}
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Verify public release
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in $(seq 1 60); do
            published="$(curl --fail --silent --show-error --max-time 20 \
              "https://ckunkel510.github.io/WL.github.io/deployment-version.txt?run=${GITHUB_RUN_ID}&attempt=${attempt}" \
              || true)"
            if [ "$published" = "$EXPECTED_SHA" ]; then
              echo "Verified public release $EXPECTED_SHA"
              exit 0
            fi
            sleep 30
          done

          echo "The public Pages site did not reach $EXPECTED_SHA in time."
          exit 1
