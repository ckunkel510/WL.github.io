openapi: 3.0.3
info:
  title: Woodson Product Search
  version: 1.0.0
  description: Search Woodson Lumber & Hardware product data.

servers:
  - url: https://script.google.com/macros/s/AKfycbyS4LXwHrCDEz7RZFR-X6nLjxoB8DtRURAGxl6D9rozZr9ET8gaIQzMkypqvdGNvF-x9Q/exec

paths:
  /exec:
    get:
      operationId: searchProducts
      summary: Search Woodson products
      description: >
        Use this tool before answering any customer product question.
        Use it when a customer asks if Woodson sells something, asks for a price,
        product link, product code, SKU, UPC, brand, size, lumber dimension,
        availability, or online product match. Examples include 2x4x8,
        2 by 4 by 8, 8 ft 2x4, treated lumber, yellow pine, plywood,
        concrete, paint, stain, tools, hardware, garden items, fish food,
        Case knives, gas cans, and Ready Seal.
      parameters:
        - name: action
          in: query
          required: true
          description: Always use searchProducts.
          schema:
            type: string
            enum:
              - searchProducts
            default: searchProducts

        - name: q
          in: query
          required: true
          description: >
            The customer's exact product search phrase. Examples: 2x4x8,
            do you sell fish food, Case knife, 24082YPL, 642921, Ready Seal pecan.
          schema:
            type: string

        - name: key
          in: query
          required: true
          description: Required access key for Woodson product search.
          schema:
            type: string
            enum:
              - WL_TAWK_PRODUCT_SEARCH_2026_veryLongRandomTextHere
            default: WL_TAWK_PRODUCT_SEARCH_2026_veryLongRandomTextHere

      responses:
        "200":
          description: Product search results from Woodson product feed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  query:
                    type: string
                  normalizedQuery:
                    type: string
                  message:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        productCode:
                          type: string
                        title:
                          type: string
                        internalTitle:
                          type: string
                        description:
                          type: string
                        price:
                          type: string
                        availability:
                          type: string
                        productUrl:
                          type: string
                        imageUrl:
                          type: string
                        brand:
                          type: string
                        gtin:
                          type: string
                        confidence:
                          type: string
                        matchedText:
                          type: string
                        source:
                          type: string
