openapi: 3.0.3
info:
  title: Woodson Product Search
  version: 1.0.0
  description: Search Woodson Lumber & Hardware product data.

servers:
  - url: https://script.google.com/macros/s/AKfycbyS4LXwHrCDEz7RZFR-X6nLjxoB8DtRURAGxl6D9rozZr9ET8gaIQzMkypqvdGNvF-x9Q

paths:
  /exec:
    get:
      operationId: searchProducts
      summary: Search Woodson products
      description: >
        Use this tool before answering any product question. Use it when a customer
        asks whether Woodson sells a product, asks for a price, product link, SKU,
        UPC, product code, brand, size, lumber dimension, or availability. Examples:
        2x4x8, 24082YPL, 642921, fish food, Case knife, treated lumber, yellow pine,
        plywood, paint, stain, tools, hardware, garden items.
      parameters:
        - name: q
          in: query
          required: true
          description: >
            The customer's exact product search phrase. Extract the product term,
            SKU, UPC, brand, or size from the customer message. Examples: 2x4x8,
            24082YPL, fish food, Case knife, Ready Seal pecan.
          schema:
            type: string
      responses:
        "200":
          description: Product search results from Woodson product feed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  query:
                    type: string
                  message:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        productCode:
                          type: string
                        title:
                          type: string
                        price:
                          type: string
                        availability:
                          type: string
                        productUrl:
                          type: string
                        imageUrl:
                          type: string
                        confidence:
                          type: string
