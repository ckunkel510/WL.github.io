openapi: 3.0.3
info:
  title: Woodson Product Search
  version: 6.0.0
  description: Search Woodson Lumber & Hardware products using POST JSON, cache-first validated results, OpenAI result validation, self-healing query learning, and text-only product links.

servers:
  - url: https://script.google.com/macros/s/AKfycbyS4LXwHrCDEz7RZFR-X6nLjxoB8DtRURAGxl6D9rozZr9ET8gaIQzMkypqvdGNvF-x9Q

paths:
  /exec:
    post:
      operationId: searchProducts
      summary: Search Woodson products without image links
      description: >
        Use this tool before answering any product question or product-like phrase.
        Send a POST JSON body with the customer's exact product phrase in the query field.
        Never call this tool with an empty query.

        For follow-up product messages, include relevant prior product context in the query.
        Example: if the visitor first says "1/2 inch by 6 inch by 16 foot wood fascia"
        and then says "smart side wood", call this tool with
        query="1/2 inch by 6 inch by 16 foot wood fascia smart side wood".

        If hasResults=true, reply using the answer field exactly. Do not rewrite it,
        add image markdown, add image links, or list extra products.

        If hasResults=false, reply using the answer field exactly. Do not ask for
        details already provided by the visitor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: REQUIRED. The visitor's exact product message or product identifier. Include prior context for follow-up product questions.
                action:
                  type: string
                  description: Optional. Use searchProducts if provided.
                  default: searchProducts
            examples:
              frontDoors:
                summary: Front doors
                value:
                  query: front doors
              fasciaFollowUp:
                summary: Product follow-up with context
                value:
                  query: 1/2 inch by 6 inch by 16 foot wood fascia smart side wood
              cinderBlocks:
                summary: No-result item
                value:
                  query: 12 x 12 x 3 cinder blocks
      responses:
        "200":
          description: Product search response. Use answer exactly.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - hasResults
                  - matchType
                  - answer
                  - results
                properties:
                  success:
                    type: boolean
                  hasResults:
                    type: boolean
                  matchType:
                    type: string
                    enum:
                      - exact
                      - close
                      - loose
                      - none
                  query:
                    type: string
                  normalizedQuery:
                    type: string
                  message:
                    type: string
                  instruction:
                    type: string
                  answer:
                    type: string
                    description: Customer-ready response. Use this exactly whether hasResults is true or false.
                  openAIUsed:
                    type: boolean
                  openAIError:
                    type: string
                  validation:
                    type: object
                    nullable: true
                    additionalProperties: true
                  learningUsed:
                    type: boolean
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        productCode:
                          type: string
                        title:
                          type: string
                        internalTitle:
                          type: string
                        description:
                          type: string
                        price:
                          type: string
                        availability:
                          type: string
                        productUrl:
                          type: string
                        brand:
                          type: string
                        gtin:
                          type: string
                        condition:
                          type: string
                        confidence:
                          type: string
                        matchType:
                          type: string
                        matchedText:
                          type: string
                        source:
                          type: string
