openapi: 3.0.3
info:
  title: Woodson Product Search
  version: 1.1.0
  description: Search Woodson Lumber & Hardware products.

servers:
  - url: https://script.google.com/macros/s/AKfycbyS4LXwHrCDEz7RZFR-X6nLjxoB8DtRURAGxl6D9rozZr9ET8gaIQzMkypqvdGNvF-x9Q

paths:
  /exec:
    get:
      operationId: searchProducts
      summary: Search Woodson products
      description: >
        Use this tool before answering any product question.

        Send the customer's exact product phrase as q. Examples: paint, lumber,
        2x4x8, 2x4x8 yellow pine, 24082YPL, 642921, caulk, fish food,
        Case knife, treated lumber, plywood, stain, tools, hardware, garden items.

        IMPORTANT: If the response has hasResults=true, use the answer field as the
        customer response. The answer field is already written for the customer.

        Do not say you are unable to search. Do not say you are having trouble
        retrieving information. Do not ask for more details before showing returned
        results.

        The tool may return exact, close, or loose matches. If exact, close, or loose
        results are returned, show the answer/results and ask which item they mean
        when multiple products are listed.
      parameters:
        - name: query
          in: query
          required: true
          description: >
             REQUIRED. The exact customer product phrase or product identifier.
            For example, if the customer says "looking for tan caulk", send
            "looking for tan caulk". Never leave this blank.
            Other examples: 2x4x8 lumber, NP1 caulk, Scotts fertilizer,
            24082YPL, 642921, paint, mulch, deck screws.
          schema:
            type: string
      responses:
        "200":
          description: Product search response. Use answer when hasResults is true.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - hasResults
                  - matchType
                  - answer
                  - results
                properties:
                  success:
                    type: boolean
                  hasResults:
                    type: boolean
                    description: If true, matching products were found and the answer should be used.
                  matchType:
                    type: string
                    enum:
                      - exact
                      - close
                      - loose
                      - none
                    description: Quality of the best returned match.
                  query:
                    type: string
                  normalizedQuery:
                    type: string
                  message:
                    type: string
                  instruction:
                    type: string
                  answer:
                    type: string
                    description: Customer-ready response. Use this in the chat when hasResults is true.
                  results:
                    type: array
                    description: Matching Woodson products.
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        productCode:
                          type: string
                        title:
                          type: string
                        internalTitle:
                          type: string
                        description:
                          type: string
                        price:
                          type: string
                        availability:
                          type: string
                        productUrl:
                          type: string
                        imageUrl:
                          type: string
                        brand:
                          type: string
                        gtin:
                          type: string
                        condition:
                          type: string
                        confidence:
                          type: string
                        matchType:
                          type: string
                        matchedText:
                          type: string
                        source:
                          type: string
