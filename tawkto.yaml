openapi: 3.0.3
info:
  title: Woodson Product Search
  version: 5.0.0
  description: Search Woodson Lumber & Hardware products using POST JSON, OpenAI result validation, self-healing query learning, and text-only product links.

servers:
  - url: https://script.google.com/macros/s/AKfycbyS4LXwHrCDEz7RZFR-X6nLjxoB8DtRURAGxl6D9rozZr9ET8gaIQzMkypqvdGNvF-x9Q

paths:
  /exec:
    post:
      operationId: searchProducts
      summary: Search Woodson products
      description: >
        Use this tool before answering any product question or product-like phrase.
        Send a POST JSON body with the customer's exact product phrase in the query field.
        Never call this tool with an empty query.

        Examples:
        - Visitor says "miracle gro" -> body {"query":"miracle gro"}
        - Visitor says "5 ft by 100 ft fence roll" -> body {"query":"5 ft by 100 ft fence roll"}
        - Visitor says "Big boy deer feeders" -> body {"query":"Big boy deer feeders"}
        - Visitor says "Horse panels" -> body {"query":"Horse panels"}
        - Visitor says "24082YPL" -> body {"query":"24082YPL"}

        If hasResults=true, reply using the answer field exactly. Do not rewrite it,
        add image markdown, add image links, or list extra products. Do not say no match was found
        when products are returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: REQUIRED. The visitor's exact product message or product identifier. Do not summarize, shorten, or leave blank.
                action:
                  type: string
                  description: Optional. Use searchProducts if provided.
                  default: searchProducts
            examples:
              fenceRoll:
                summary: Fence roll search
                value:
                  query: 5 ft by 100 ft fence roll
              deerFeeders:
                summary: Deer feeder search
                value:
                  query: Big boy deer feeders
              horsePanels:
                summary: Horse panel search
                value:
                  query: Horse panels
      responses:
        "200":
          description: Product search response. Use answer exactly when hasResults is true.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - hasResults
                  - matchType
                  - answer
                  - results
                properties:
                  success:
                    type: boolean
                  hasResults:
                    type: boolean
                  matchType:
                    type: string
                    enum:
                      - exact
                      - close
                      - loose
                      - none
                  query:
                    type: string
                  normalizedQuery:
                    type: string
                  message:
                    type: string
                  instruction:
                    type: string
                  answer:
                    type: string
                    description: Customer-ready response. Use this exactly when hasResults is true.
                  openAIUsed:
                    type: boolean
                  openAIError:
                    type: string
                  validation:
                    type: object
                    nullable: true
                    additionalProperties: true
                  learningUsed:
                    type: boolean
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        productCode:
                          type: string
                        title:
                          type: string
                        internalTitle:
                          type: string
                        description:
                          type: string
                        price:
                          type: string
                        availability:
                          type: string
                        productUrl:
                          type: string
                        brand:
                          type: string
                        gtin:
                          type: string
                        condition:
                          type: string
                        confidence:
                          type: string
                        matchType:
                          type: string
                        matchedText:
                          type: string
                        source:
                          type: string
