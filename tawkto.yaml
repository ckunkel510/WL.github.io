openapi: 3.0.3
info:
  title: Woodson Customer-Safe Product Search
  version: 11.0.0
  description: Search the current Woodson Lumber & Hardware online catalog and verified WebTrack product groups. This API exposes customer-facing product data only and never exposes cost, margin, markup, profit, supplier, vendor, or advertising-economics data.

servers:
  - url: https://wl-upsrates.vercel.app

paths:
  /api/ai-product-search:
    post:
      operationId: searchProducts
      summary: Search Woodson's current customer-safe product catalog
      description: >
        Use this tool before answering any product question, product-like phrase,
        or request to browse a product group or department.
        Send a POST JSON body with the customer's exact product phrase in the query field.
        Never call this tool with an empty query.

        For follow-up product messages, include relevant prior product context in the query.
        When a visitor explicitly asks to open, view, or go to one previously returned
        product, set action=view_product and copy that result's productCode exactly into
        productCode. When a visitor explicitly asks to add, put, buy, or purchase one
        previously returned product, set action=add_to_cart and copy that result's
        productCode exactly into productCode. Never guess or alter a productCode.
        Never use an action when multiple products remain possible.
        A new named product or item number always replaces earlier product context.
        Treat pronouns such as "it", "that", or "this one" as referring to the most
        recently returned single product only. Never reuse an earlier product when
        the visitor names a different product in the same add-to-cart request.

        If the visitor asks to place, submit, complete, or check out an order, do not
        call this tool for an action and do not claim to place the order. Tell them
        they will be taken to their cart to review checkout and submit the order themselves.

        actionReady means only that one verified product is safe for a browser action.
        It never proves that WebTrack changed the cart. For add_to_cart, tell the visitor
        to look for the Woodson cart confirmation on the page. Never say an item was added
        unless that on-page confirmation appears.

        If hasResults=true, reply using the answer field exactly. Do not add unreturned
        products, specifications, prices, availability claims, or assumptions.
        Prefer the one best verified product. The API returns up to three choices only
        when the request is genuinely ambiguous, ordered with the closest match first.
        Preserve every product-image link, product-details link, and verified product-group
        link in the answer exactly as returned.
        If hasResults=false for an ordinary product or cart request, reply using the
        answer field exactly and ask one concise clarifying question. Do not transfer
        the chat merely because a product was not found, an add-to-cart attempt needs
        clarification, or WebTrack did not confirm the cart change.
        Invoke the configured human handoff only when sensitiveRequest=true, the visitor
        explicitly requests a person, or a repeated technical failure still prevents help.

        Never ask this tool for internal cost, average cost, margin, markup, profit,
        supplier pricing, vendor terms, or advertising economics. Those fields do not
        exist in this customer-safe catalog.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  maxLength: 240
                  description: REQUIRED. The visitor's exact product request or identifier, with relevant prior product context for follow-ups.
                action:
                  type: string
                  enum:
                    - search
                    - view_product
                    - add_to_cart
                  default: search
                  description: Use view_product or add_to_cart only after the visitor explicitly requests that action for one previously returned exact product.
                productCode:
                  type: string
                  maxLength: 80
                  description: For view_product or add_to_cart, copy the exact productCode from the one previously returned result. Never infer or alter it.
            examples:
              cordlessDrill:
                summary: Brand-qualified product request
                value:
                  query: Milwaukee cordless drill
              fasciaFollowUp:
                summary: Product follow-up with context
                value:
                  query: 1/2 inch by 6 inch by 16 foot fascia LP SmartSide
              productCode:
                summary: Exact product code
                value:
                  query: 2462-22
      responses:
        "200":
          description: Customer-safe product search response. Use answer exactly.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - hasResults
                  - matchType
                  - answer
                  - results
                properties:
                  success:
                    type: boolean
                  hasResults:
                    type: boolean
                  matchType:
                    type: string
                    enum:
                      - exact
                      - close
                      - group
                      - none
                  resultType:
                    type: string
                    enum:
                      - groups
                  query:
                    type: string
                  sensitiveRequest:
                    type: boolean
                    description: True when the request asks for protected internal economics. Use answer and hand off to a human.
                  requestedAction:
                    type: string
                    enum:
                      - view_product
                      - add_to_cart
                  actionReady:
                    type: boolean
                    description: True only when one exact verified product is safe for the requested browser or cart action. It does not confirm that WebTrack changed the cart.
                  actionStatus:
                    type: string
                    enum:
                      - browser_confirmation_required
                      - browser_navigation_requested
                    description: For add_to_cart, browser_confirmation_required means the visitor must see the Woodson on-page confirmation before the AI may describe the cart action as successful.
                  answer:
                    type: string
                    description: Customer-ready response. Use this exactly whether hasResults is true or false.
                  results:
                    type: array
                    maxItems: 3
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        rank:
                          type: integer
                        productId:
                          type: string
                        productCode:
                          type: string
                        title:
                          type: string
                        description:
                          type: string
                        brand:
                          type: string
                        price:
                          type: string
                        salePrice:
                          type: string
                        availability:
                          type: string
                        productUrl:
                          type: string
                        imageUrl:
                          type: string
                        category:
                          type: string
                        gtin:
                          type: string
                        mpn:
                          type: string
                        groupName:
                          type: string
                        parentGroup:
                          type: string
                        groupUrl:
                          type: string
