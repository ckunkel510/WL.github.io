openapi: 3.0.3
info:
  title: Woodson Product Search
  version: 2.0.0
  description: Search Woodson Lumber & Hardware products from the live product feed.

servers:
  - url: https://script.google.com/macros/s/AKfycbyS4LXwHrCDEz7RZFR-X6nLjxoB8DtRURAGxl6D9rozZr9ET8gaIQzMkypqvdGNvF-x9Q

paths:
  /exec:
    post:
      operationId: searchProducts
      summary: Search Woodson products
      description: >
        Use this tool before answering any product question or product-like phrase.

        IMPORTANT: Send a POST JSON body with the customer's exact product phrase
        in the query field. Never call this tool with an empty query.

        Examples:
        - Visitor says "miracle gro" -> body {"query":"miracle gro"}
        - Visitor says "looking for tan caulk" -> body {"query":"looking for tan caulk"}
        - Visitor says "Np1 caulk" -> body {"query":"Np1 caulk"}
        - Visitor says "Scotts fertilizer" -> body {"query":"Scotts fertilizer"}
        - Visitor says "2x4x8 lumber" -> body {"query":"2x4x8 lumber"}
        - Visitor says "24082YPL" -> body {"query":"24082YPL"}

        Use this tool for product names, prices, product links, SKUs, UPCs, GTINs,
        product codes, manufacturer codes, brands, sizes, lumber dimensions,
        categories, colors, and availability.

        If hasResults=true, use the answer field as the customer reply.
        Do not say no match was found when products are returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: >
                    REQUIRED. The visitor's exact product message or product identifier.
                    Do not summarize, shorten, or leave blank.
                    Example: looking for tan caulk
                action:
                  type: string
                  description: Optional. Use searchProducts if provided.
                  default: searchProducts
            examples:
              miracleGro:
                summary: Miracle Gro search
                value:
                  query: miracle gro
              tanCaulk:
                summary: Tan caulk search
                value:
                  query: looking for tan caulk
              lumber:
                summary: Lumber dimension search
                value:
                  query: 2x4x8 lumber
      responses:
        "200":
          description: Product search response. Use answer when hasResults is true.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - hasResults
                  - matchType
                  - answer
                  - results
                properties:
                  success:
                    type: boolean
                  hasResults:
                    type: boolean
                    description: If true, matching products were found and answer should be used.
                  matchType:
                    type: string
                    enum:
                      - exact
                      - close
                      - loose
                      - none
                  query:
                    type: string
                  normalizedQuery:
                    type: string
                  message:
                    type: string
                  instruction:
                    type: string
                  answer:
                    type: string
                    description: Customer-ready response. Use this when hasResults is true.
                  openAIUsed:
                    type: boolean
                  openAIError:
                    type: string
                  expansion:
                    type: object
                    nullable: true
                    additionalProperties: true
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        productCode:
                          type: string
                        title:
                          type: string
                        internalTitle:
                          type: string
                        description:
                          type: string
                        price:
                          type: string
                        availability:
                          type: string
                        productUrl:
                          type: string
                        imageUrl:
                          type: string
                        brand:
                          type: string
                        gtin:
                          type: string
                        condition:
                          type: string
                        confidence:
                          type: string
                        matchType:
                          type: string
                        matchedText:
                          type: string
                        source:
                          type: string
